<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的简易网页</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }
        /* 导航栏 */
        nav {
            width: 100%;
            height: 60px;
            background: #2563eb;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 5%;
        }
        .logo {
            color: white;
            font-size: 22px;
            font-weight: bold;
        }
        .nav-link a {
            color: white;
            text-decoration: none;
            margin-left: 30px;
            font-size: 16px;
        }
        .nav-link a:hover {
            color: #bfdbfe;
        }
        /* 头部横幅 */
        .banner {
            width: 100%;
            height: 320px;
            background: linear-gradient(135deg,#3b82f6,#0ea5e9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            text-align: center;
        }
        .banner h1 {
            font-size: 42px;
            margin-bottom: 15px;
        }
        .banner p {
            font-size: 18px;
            opacity: 0.9;
        }
        .banner button {
            margin-top: 25px;
            padding: 12px 32px;
            border: none;
            border-radius: 30px;
            background: white;
            color: #2563eb;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }
        .banner button:hover {
            background: #f0f7ff;
            transform: translateY(-3px);
        }
        /* 内容容器 */
        .container {
            width: 90%;
            max-width: 1200px;
            margin: 60px auto;
        }
        .title-box {
            text-align: center;
            margin-bottom: 40px;
        }
        .title-box h2 {
            font-size: 30px;
            color: #1e293b;
            margin-bottom: 10px;
        }
        .title-box span {
            display: inline-block;
            width: 60px;
            height: 4px;
            background: #2563eb;
        }
        /* 卡片布局 */
        .card-wrap {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px,1fr));
            gap: 30px;
        }
        .card {
            padding: 30px;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            transition: 0.3s;
        }
        .card:hover {
            box-shadow: 0 8px 24px #e2e8f0;
            transform: translateY(-5px);
        }
        .card h3 {
            font-size: 20px;
            color: #1e293b;
            margin-bottom: 12px;
        }
        .card p {
            color: #64748b;
            line-height: 1.7;
        }
        /* 页脚 */
        footer {
            width: 100%;
            padding: 40px 0;
            background: #0f172a;
            color: #94a3b8;
            text-align: center;
            margin-top: 80px;
        }
        /* 手机适配 */
        @media(max-width:768px){
            .nav-link a {
                margin-left: 15px;
                font-size: 14px;
            }
            .banner h1 {
                font-size: 28px;
            }
        }
    </style>
</head>
<body>
    <!-- 导航 -->
    <nav>
        <div class="logo">我的网站</div>
        <div class="nav-link">
            <a href="#">首页</a>
            <a href="#">关于我们</a>
            <a href="#">服务</a>
            <a href="#">联系我</a>
        </div>
    </nav>

    <!-- 横幅 -->
    <div class="banner">
        <h1>欢迎来到我的网页</h1>
        <p>简洁、美观、自适应通用网页模板</p>
        <button>了解更多</button>
    </div>

    <!-- 主体内容 -->
    <div class="container">
        <div class="title-box">
            <h2>核心功能</h2>
            <span></span>
        </div>
        <div class="card-wrap">
            <div class="card">
                <h3>自适应布局</h3>
                <p>电脑、平板、手机自动适配，一套代码兼容所有设备，无需额外修改。</p>
            </div>
            <div class="card">
                <h3>简洁样式</h3>
                <p>内置现代简约蓝色主题，hover悬浮动画，层次清晰，视觉舒适。</p>
            </div>
            <div class="card">
                <h3>极易修改</h3>
                <p>代码分段注释清晰，文字、颜色、图片、栏目可以一键替换修改。</p>
            </div>
        </div>
    </div>

    <!-- 页脚 -->
    <footer>
        <p>© 2026 我的网页 版权所有</p>
    </footer>
</body>
</html>
