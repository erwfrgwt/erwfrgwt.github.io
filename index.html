<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facaifu</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
        }

        body {
            background: #0a0e27;
            color: #e0e6ff;
            line-height: 1.6;
        }

        /* 导航栏 */
        nav {
            width: 100%;
            height: 70px;
            background: rgba(10, 14, 39, 0.85);
            border-bottom: 1px solid rgba(99, 102, 241, 0.3);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 5%;
            position: sticky;
            top: 0;
            z-index: 1000;
            backdrop-filter: blur(10px);
        }

        .logo {
            color: #ffffff;
            font-size: 24px;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .nav-link a {
            color: #aeb7df;
            text-decoration: none;
            margin-left: 30px;
            font-size: 16px;
            transition: 0.3s;
        }

        .nav-link a:hover {
            color: #818cf8;
            text-shadow: 0 0 8px rgba(99, 102, 241, 0.8);
        }

        /* 头部横幅 */
        .banner {
            width: 100%;
            min-height: 380px;
            background:
                radial-gradient(circle at top left, rgba(139, 92, 246, 0.4), transparent 35%),
                radial-gradient(circle at bottom right, rgba(59, 130, 246, 0.4), transparent 35%),
                linear-gradient(135deg, #0a0e27 0%, #111827 50%, #0f172a 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            text-align: center;
            padding: 60px 20px;
            position: relative;
            overflow: hidden;
        }

        .banner::before {
            content: "";
            position: absolute;
            width: 120%;
            height: 120%;
            background-image:
                linear-gradient(rgba(99, 102, 241, 0.1) 1px, transparent 1px),
                linear-gradient(90deg, rgba(99, 102, 241, 0.1) 1px, transparent 1px);
            background-size: 40px 40px;
            opacity: 0.6;
            animation: gridMove 20s linear infinite;
        }

        @keyframes gridMove {
            0% { transform: translate(0, 0); }
            100% { transform: translate(40px, 40px); }
        }

        .banner h1 {
            font-size: 48px;
            margin-bottom: 15px;
            z-index: 1;
            background: linear-gradient(90deg, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .banner p {
            font-size: 18px;
            color: #aeb7df;
            margin-bottom: 25px;
            z-index: 1;
        }

        .banner button {
            padding: 14px 36px;
            border: 1px solid rgba(139, 92, 246, 0.6);
            border-radius: 30px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.5);
            z-index: 1;
        }

        .banner button:hover {
            transform: translateY(-3px);
            box-shadow: 0 0 35px rgba(139, 92, 246, 0.7);
        }

        /* 内容容器 */
        .container {
            width: 90%;
            max-width: 1200px;
            margin: 80px auto;
        }

        .title-box {
            text-align: center;
            margin-bottom: 50px;
        }

        .title-box h2 {
            font-size: 32px;
            color: #ffffff;
            margin-bottom: 10px;
        }

        .title-box span {
            display: inline-block;
            width: 80px;
            height: 4px;
            background: linear-gradient(90deg, #6366f1, #8b5cf6);
            border-radius: 2px;
        }

        /* 卡片布局 */
        .card-wrap {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
        }

        .card {
            padding: 35px;
            border: 1px solid rgba(99, 102, 241, 0.3);
            border-radius: 16px;
            background: rgba(10, 14, 39, 0.9);
            transition: 0.3s;
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, #6366f1, #8b5cf6, #6366f1);
            transform: scaleX(0);
            transition: 0.3s;
        }

        .card:hover::before {
            transform: scaleX(1);
        }

        .card:hover {
            transform: translateY(-8px);
            box-shadow: 0 10px 30px rgba(99, 102, 241, 0.4);
            border-color: rgba(139, 92, 246, 0.5);
        }

        .card h3 {
            font-size: 22px;
            color: #ffffff;
            margin-bottom: 12px;
        }

        .card p {
            color: #aeb7df;
            line-height: 1.8;
        }

        /* 页脚 */
        footer {
            width: 100%;
            padding: 40px 0;
            background: #050816;
            color: #6b7280;
            text-align: center;
            margin-top: 80px;
            border-top: 1px solid rgba(99, 102, 241, 0.2);
        }

        /* 手机适配 */
        @media (max-width: 768px) {
            .nav-link a {
                margin-left: 15px;
                font-size: 14px;
            }

            .banner h1 {
                font-size: 32px;
            }

            .banner p {
                font-size: 16px;
            }

            .card {
                padding: 25px;
            }
        }
    </style>
</head>
<body>
    <!-- 导航 -->
    <nav>
        <div class="logo">TECH LAB</div>
        <div class="nav-link">
            <a href="#">首页</a>
            <a href="#">联系</a>
        </div>
    </nav>

    <!-- 横幅 -->
    <div class="banner">
        <h1>全能工具</h1>
        <p>智能、高效、可靠的数字化体验</p>
        <button onclick="openInnerPage()">赶紧进来</button>
    </div>

    <!-- 主体内容 -->
    <div class="container">
        <div class="title-box">
            <h2>核心能力</h2>
            <span></span>
        </div>
        <div class="card-wrap">
            <div class="card">
                <h3>智能系统</h3>
                <p>基于智能算法与数据处理能力，为业务提供快速分析、判断与决策支持。</p>
            </div>
            <div class="card">
                <h3>高速运算</h3>
                <p>采用高效计算架构，提升数据处理效率，降低响应时间与运行成本。</p>
            </div>
            <div class="card">
                <h3>安全防护</h3>
                <p>多层安全机制保护数据传输与存储，降低风险，提升系统稳定性。</p>
            </div>
        </div>
    </div>

    <!-- 模拟的内层页面，这里简单用一个弹窗模拟 -->
    <div id="innerPage" style="display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(10, 14, 39, 0.85); border: 1px solid rgba(99, 102, 241, 0.3); padding: 30px; border-radius: 15px; color: white; text-align: center; box-shadow: 0 0 20px rgba(99, 102, 241, 0.5);">
        <h2 style="background: linear-gradient(90deg, #6366f1, #8b5cf6); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">哈基米南北绿豆</h2>
        <p style="color: #aeb7df;">这里是具有科技感的内容区域。</p>
        <button style="padding: 10px 20px; border: 1px solid rgba(139, 92, 246, 0.6); border-radius: 20px; background: linear-gradient(135deg, #6366f1, #8b5cf6); color: white; cursor: pointer;" onclick="closeInnerPage()">关闭</button>
    </div>

    <script>
        function openInnerPage() {
            document.getElementById('innerPage').style.display = 'block';
        }
        function closeInnerPage() {
            document.getElementById('innerPage').style.display = 'none';
        }
    </script>

    <!-- 页脚 -->
    <footer>
        <p>© 2026 Facaifu 版权所有</p>
    </footer>
</body>
</html>
